<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rutas GPX</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet GPX plugin -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <style>
    #map { height: 100vh; }
    
    /* ESTILO PARA LAS ETIQUETAS SIEMPRE VISIBLES */
    .etiqueta-ruta {
        background: white;
        border: 2px solid #333;
        border-radius: 4px;
        padding: 2px 6px;
        font-weight: bold;
        font-size: 13px;
        color: #000;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    /* Quitar la flechita del tooltip para que parezca una etiqueta limpia */
    .leaflet-tooltip-top:before { border-top-color: transparent; }
</style>
</head>

<body>

  <div id="map"></div>

 <script>
    const map = L.map("map").setView([39.8, -0.2], 9);

    const satelite = L.tileLayer("https://arcgisonline.com{z}/{y}/{x}", {
        attribution: "© Esri"
    }).addTo(map);

    const labels = L.tileLayer("https://arcgisonline.com{z}/{y}/{x}").addTo(map);

    const rutas = [
        { gpx: "1.gpx", url: "https://youtu.be", color: "blue" },
        { gpx: "2.gpx", url: "https://youtu.be", color: "red" },
        { gpx: "Senda lateral Albares.gpx", url: "https://youtube.com", color: "green" }
    ];

    rutas.forEach(ruta => {
        const gpxLayer = new L.GPX(ruta.gpx, {
            async: true,
            polyline_options: { color: ruta.color, weight: 5, opacity: 0.8 },
            marker_options: {
                startIconUrl: null, // Quitamos iconos de inicio/fin para no tapar el texto
                endIconUrl: null,
                shadowUrl: null,
                wptIconUrls: { '': null } // Evitamos que ponga iconos de chincheta por defecto
            }
        });

        gpxLayer.on("loaded", function(e) {
            map.fitBounds(e.target.getBounds(), { padding: [50, 50] });
            
            // Forzamos la lectura de los Waypoints (puntos de interés)
            const gpx = e.target;
            gpx.getLayers().forEach(layer => {
                // Buscamos capas que tengan opciones de nombre (Waypoints)
                if (layer instanceof L.Marker && layer.options.title) {
                    layer.bindTooltip(layer.options.title, {
                        permanent: true,
                        direction: 'top',
                        className: 'etiqueta-ruta',
                        offset: [0, -10] // Ajuste para que no pise el punto exacto
                    }).addTo(map);
                }
            });
        });

        // Hacer que toda la ruta sea clicable hacia YouTube
        gpxLayer.on("click", () => window.open(ruta.url, "_blank"));
        
        gpxLayer.addTo(map);
    });
</script>

</body>
</html>
