<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rutas GPX</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet GPX plugin -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <style>
    #map {
      height: 100vh;
    }
	
	
	.leaflet-tooltip.mi-etiqueta {
  background-color: rgba(255, 255, 255, 0.8);
  border: 1px solid #333;
  border-radius: 4px;
  padding: 2px 5px;
  font-weight: bold;
  font-size: 12px;
}

	
	
	
  </style>
</head>

<body>

  <div id="map"></div>

  <script>
    /* =====================================
       MAPA
       ===================================== */
   const map = L.map("map").setView([39.8, -0.2], 9);



/* L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap · © OpenTopoMap",
  maxZoom: 17
}).addTo(map);*/
// Capa satélite (ESRI)
const satelite = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri · Maxar · Earthstar Geographics"
  }
).addTo(map);

// Capa de etiquetas y carreteras
const labels = L.tileLayer(
  "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri"
  }
).addTo(map);


    /* =====================================
       GPX + URL ASOCIADA
       ===================================== */
    const rutas = [
      {
        gpx: "1.gpx",
        url: "https://youtu.be/B6VvOnKYdPg",
        color: "blue"
      },
      {
        gpx: "2.gpx",
        url: "https://youtu.be/N859GPHNy0A",
        color: "red"
      },
 {
        gpx: "Senda lateral Albares.gpx",
        url: "https://www.youtube.com/watch?v=Ay8jkCy4HZQ",
        color: "green"
      }

      
    ];

       /* =====================================
       CARGA DE RUTAS
       ===================================== */
    rutas.forEach(ruta => {
      const gpxLayer = new L.GPX(ruta.gpx, {
        async: true,
        polyline_options: {
          color: ruta.color,
          weight: 4
        },
        // Desactivamos los marcadores por defecto para manejarlos nosotros
        marker_options: {
          startIconUrl: null,
          endIconUrl: null,
          shadowUrl: null
        }
      });

      gpxLayer.on("loaded", e => {
        const gpx = e.target;
        map.fitBounds(gpx.getBounds(), { padding: [20, 20] });

        // ESTO ES LO QUE BUSCAS:
        // Buscamos los Waypoints (puntos de interés) del archivo GPX
        gpx.getLayers().forEach(layer => {
          // Si la capa es un marcador (punto) y tiene nombre
          if (layer instanceof L.Marker && layer.options.title) {
            layer.bindTooltip(layer.options.title, {
              permanent: true,   // Hace que sea siempre visible
              direction: 'top',  // Posición encima del punto
              className: 'mi-etiqueta' // Clase CSS por si quieres darle estilo
            }).addTo(map);
          }
        });
      });

      gpxLayer.on("click", () => {
        window.open(ruta.url, "_blank");
      });

      gpxLayer.addTo(map);
    });

  </script>

</body>
</html>
