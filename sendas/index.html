<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Rutas GPX</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet GPX plugin -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <style>
    #map {
      height: 100vh;
    }
	
	
.etiqueta-visible div {
      background: white !important;
      border: 2px solid #333 !important;
      color: black !important;
      font-weight: bold !important;
      padding: 6px 12px !important; /* Más relleno para que sea un botón grande */
      border-radius: 8px !important;
      display: inline-block !important;
      white-space: nowrap !important;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.4) !important;
      
      /* Tamaño para PC */
      font-size: 14px !important; 
      
      transform: translate(-50%, -100%);
      position: absolute;
    }

    /* AJUSTE AUTOMÁTICO PARA MÓVILES (Smartphone) */
   @media (max-width: 768px) {
      .etiqueta-visible div {
        font-size: 24px !important;    /* Texto mucho más grande */
        padding: 12px 20px !important;  /* Más espacio interior */
        border-width: 4px !important;   /* Borde más grueso */
        border-radius: 12px !important; /* Esquinas más redondeadas */
      }
    }

    /* Elimina las sombras y los iconos por defecto que no hayamos definido nosotros */
	
	
	
	
    .leaflet-marker-icon[src*="marker-icon"] {
        display: none !important;
    }
	
	
	/* Estilo del botón "i" */
    .info-button {
      background: white;
      width: 34px;
      height: 34px;
      line-height: 34px;
      text-align: center;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
      font-family: serif;
      font-size: 20px;
      border: 2px solid rgba(0,0,0,0.2);
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }
    .info-button:hover { background: #f4f4f4; }
	
	/* AJUSTE PARA MÓVILES: Botón de info más grande */
    @media (max-width: 768px) {
      .info-button {
        width: 70px;         /* Más grande para el dedo */
        height: 70px;
        line-height: 65px;
        font-size: 45px;     /* Letra "i" más grande */
        border-width: 4px;
      }
    }
	
	/* AJUSTE ESPECÍFICO PARA MÓVILES EN VERTICAL */
    @media (max-width: 480px) {
      .info-button {
        width: 40px !important;    /* Un poco más grande aún */
        height: 40px !important;
        line-height: 35px !important;
        font-size: 35px !important;
      }

      .etiqueta-visible div {
        font-size: 14px !important; /* Letras S y X bien grandes */
        padding: 7px 13px !important;
      }

      .modal-content {
        width: 85% !important;
        font-size: 26px !important; /* Texto "En pruebas" más legible */
        margin-top: 30% !important; /* Bajamos la ventana para que no estorbe arriba */
      }
    }

    /* Estilo de la ventana emergente (Modal) */
    .modal-info {
      display: none; 
      position: fixed;
      z-index: 10000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background: white;
      margin: 15% auto;
      padding: 20px;
      border-radius: 10px;
      width: 70%;
      max-width: 400px;
      text-align: center;
      position: relative;
    }
    .close-modal {
      position: absolute;
      right: 10px; top: 5px;
      cursor: pointer;
      font-size: 24px;
    }
	
	@media (max-width: 768px) {
      .modal-content {
        width: 90%;        /* Que ocupe casi toda la anchura */
        font-size: 22px;   /* Texto más grande dentro del modal */
      }
      .close-modal {
        font-size: 40px;   /* Aspa de cerrar más grande */
      }
    }

  </style>
</head>

<body>

  <div id="map"></div>
  
  <div id="miModal" class="modal-info">
    <div class="modal-content">
      <span class="close-modal" onclick="cerrarModal()">&times;</span>
      <div id="texto-info">
        <p>En pruebas.</p>
      </div>
    </div>
  </div>

  <script>
    /* =====================================
       MAPA
       ===================================== */
   const map = L.map("map").setView([39.8, -0.2], 9);
   
   // Crear el botón de información en el mapa
    const infoControl = L.control({ position: 'topright' });

    infoControl.onAdd = function() {
      const div = L.DomUtil.create('div', 'info-button');
      div.innerHTML = 'i';
      div.onclick = function() {
        document.getElementById("miModal").style.display = "block";
      };
      return div;
    };
    infoControl.addTo(map);

    // Funciones para cerrar la ventana
    function cerrarModal() {
      document.getElementById("miModal").style.display = "none";
    }

    // Cerrar si se hace click fuera de la cajita blanca
    window.onclick = function(event) {
      const modal = document.getElementById("miModal");
      if (event.target == modal) { cerrarModal(); }
    }



/* L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap · © OpenTopoMap",
  maxZoom: 17
}).addTo(map);*/
// Capa satélite (ESRI)
const satelite = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri · Maxar · Earthstar Geographics"
  }
).addTo(map);

// Capa de etiquetas y carreteras
const labels = L.tileLayer(
  "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri"
  }
).addTo(map);


    /* =====================================
       GPX + URL ASOCIADA
       ===================================== */
    const rutas = [
      {
        gpx: "1.gpx",
        url: "https://youtu.be/B6VvOnKYdPg",
        color: "blue"
      },
      {
        gpx: "2.gpx",
        url: "https://youtu.be/N859GPHNy0A",
        color: "red"
      },
 {
        gpx: "Senda lateral Albares.gpx",
        url: "https://www.youtube.com/watch?v=Ay8jkCy4HZQ",
        color: "red"
      }

      
    ];

    /* =====================================
       CARGA DE RUTAS (SOLUCIÓN DEFINITIVA)
       ===================================== */
    rutas.forEach(ruta => {
      // 1. Dibujamos la línea de la ruta (esto ya te funcionaba)
      const gpxLayer = new L.GPX(ruta.gpx, {
        async: true,
        polyline_options: {
          color: ruta.color,
          weight: 6,
          opacity: 0.8
        },
        marker_options: {
          startIconUrl: null, // Quitamos la gota del inicio
          shadowUrl: null,
          // Creamos la X con código directamente aquí
          endIconUrl: 'data:image/svg+xml;base64,' + btoa(`
            <svg xmlns="http://w3.org" width="30" height="30" viewBox="0 0 30 30">
              <circle cx="15" cy="15" r="13" fill="white" stroke="red" stroke-width="2"/>
              <line x1="9" y1="9" x2="21" y2="21" stroke="red" stroke-width="4" stroke-linecap="round"/>
              <line x1="21" y1="9" x2="9" y2="21" stroke="red" stroke-width="4" stroke-linecap="round"/>
            </svg>
          `),
          iconSize: [30, 30],
          iconAnchor: [15, 15],
          wptIconUrls: { '': null }
        }
      }).addTo(map);


      gpxLayer.on("loaded", e => map.fitBounds(e.target.getBounds(), { padding: [20, 20] }));
      gpxLayer.on("click", () => window.open(ruta.url, "_blank"));

      // 2. FUERZA BRUTA: Leemos el archivo a mano para sacar los nombres de los puntos
      fetch(ruta.gpx)
        .then(response => response.text())
        .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
        .then(data => {
          const wpts = data.querySelectorAll("wpt");
          wpts.forEach(wpt => {
            const lat = wpt.getAttribute("lat");
            const lon = wpt.getAttribute("lon");
            const name = wpt.querySelector("name") ? wpt.querySelector("name").textContent : null;

            if (name && lat && lon) {
              // Creamos la etiqueta de texto puro
              L.marker([lat, lon], {
                icon: L.divIcon({
                  className: 'etiqueta-visible',
                  html: `<div>${name}</div>`,
                  iconSize: [0, 0] // No ocupa espacio físico
                })
              })
              .addTo(map)
              .on("click", () => window.open(ruta.url, "_blank"));
            }
          });
        });
    });


  </script>

</body>
</html>
