<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rutas GPX</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet GPX plugin -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <style>
    #map {
      height: 100vh;
    }
	
	
    .etiqueta-visible div {
      background: white !important;
      border: 2px solid #333 !important;
      color: black !important;
      font-weight: bold !important;
      padding: 4px 8px !important;
      border-radius: 5px !important;
      display: inline-block !important;
      white-space: nowrap !important;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.4) !important;
      font-size: 14px !important;
      transform: translate(-50%, -100%); /* Centra el texto sobre la coordenada */
      position: absolute;
    }


  </style>
</head>

<body>

  <div id="map"></div>

  <script>
    /* =====================================
       MAPA
       ===================================== */
   const map = L.map("map").setView([39.8, -0.2], 9);



/* L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap · © OpenTopoMap",
  maxZoom: 17
}).addTo(map);*/
// Capa satélite (ESRI)
const satelite = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri · Maxar · Earthstar Geographics"
  }
).addTo(map);

// Capa de etiquetas y carreteras
const labels = L.tileLayer(
  "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri"
  }
).addTo(map);


    /* =====================================
       GPX + URL ASOCIADA
       ===================================== */
    const rutas = [
      {
        gpx: "1.gpx",
        url: "https://youtu.be/B6VvOnKYdPg",
        color: "blue"
      },
      {
        gpx: "2.gpx",
        url: "https://youtu.be/N859GPHNy0A",
        color: "red"
      },
 {
        gpx: "Senda lateral Albares.gpx",
        url: "https://www.youtube.com/watch?v=Ay8jkCy4HZQ",
        color: "green"
      }

      
    ];

    /* =====================================
       CARGA DE RUTAS (SOLUCIÓN DEFINITIVA)
       ===================================== */
    rutas.forEach(ruta => {
      // 1. Dibujamos la línea de la ruta (esto ya te funcionaba)
      const gpxLayer = new L.GPX(ruta.gpx, {
        async: true,
        polyline_options: { color: ruta.color, weight: 6, opacity: 0.8 },
        marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null, wptIconUrls: { '': null } }
      }).addTo(map);

      gpxLayer.on("loaded", e => map.fitBounds(e.target.getBounds(), { padding: [20, 20] }));
      gpxLayer.on("click", () => window.open(ruta.url, "_blank"));

      // 2. FUERZA BRUTA: Leemos el archivo a mano para sacar los nombres de los puntos
      fetch(ruta.gpx)
        .then(response => response.text())
        .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
        .then(data => {
          const wpts = data.querySelectorAll("wpt");
          wpts.forEach(wpt => {
            const lat = wpt.getAttribute("lat");
            const lon = wpt.getAttribute("lon");
            const name = wpt.querySelector("name") ? wpt.querySelector("name").textContent : null;

            if (name && lat && lon) {
              // Creamos la etiqueta de texto puro
              L.marker([lat, lon], {
                icon: L.divIcon({
                  className: 'etiqueta-visible',
                  html: `<div>${name}</div>`,
                  iconSize: [0, 0] // No ocupa espacio físico
                })
              })
              .addTo(map)
              .on("click", () => window.open(ruta.url, "_blank"));
            }
          });
        });
    });


  </script>

</body>
</html>
