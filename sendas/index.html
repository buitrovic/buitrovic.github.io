<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rutas GPX</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet GPX plugin -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <style>
    #map {
      height: 100vh;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <script>
    /* =====================================
       MAPA
       ===================================== */
   const map = L.map("map").setView([39.8, -0.2], 9);



/* L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap · © OpenTopoMap",
  maxZoom: 17
}).addTo(map);*/
// Capa satélite (ESRI)
const satelite = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri · Maxar · Earthstar Geographics"
  }
).addTo(map);

// Capa de etiquetas y carreteras
const labels = L.tileLayer(
  "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri"
  }
).addTo(map);


    /* =====================================
       GPX + URL ASOCIADA
       ===================================== */
    const rutas = [
      {
        gpx: "1.gpx",
        url: "https://youtu.be/B6VvOnKYdPg",
        color: "blue"
      },
      {
        gpx: "2.gpx",
        url: "https://youtu.be/N859GPHNy0A",
        color: "red"
      },
 {
        gpx: "Senda lateral Albares.gpx",
        url: "https://www.youtube.com/watch?v=Ay8jkCy4HZQ",
        color: "green"
      }

      
    ];

    /* =====================================
       CARGA DE RUTAS
       ===================================== */
    rutas.forEach(ruta => {
      const gpxLayer = new L.GPX(ruta.gpx, {
        async: true,
        polyline_options: {
          color: ruta.color,
          weight: 4
        }
      });

       gpxLayer.on("loaded", function(e) {
        const gpx = e.target;
        map.fitBounds(gpx.getBounds(), { padding: [20, 20] });

        // Extraemos los Waypoints directamente del análisis del GPX
        const waypoints = gpx.get_waypoints();
        
        waypoints.forEach(wp => {
          // wp.name es el texto que hay en <name> dentro del GPX
          if (wp.name) {
            console.log("Creando etiqueta para:", wp.name); // Para debug
            
            // Creamos un marcador invisible solo para sostener la etiqueta
            L.marker(wp.latlng, {
              icon: L.divIcon({
                className: 'contenedor-invisible',
                html: '' 
              })
            })
            .bindTooltip(wp.name, {
              permanent: true,
              direction: 'top',
              className: 'etiqueta-visible', // Tu estilo CSS
              offset: [0, -10]
            })
            .addTo(map);
          }
        });
      });


  // Al hacer clic en la línea, abre YouTube
      gpxLayer.on("click", function(e) {
        if (e.originalEvent) e.originalEvent.stopPropagation();
        window.open(ruta.url, "_blank");
      });

      gpxLayer.addTo(map);

    }); // <--- ESTE ES EL QUE CIERRA EL rutas.forEach(ruta => {

      gpxLayer.addTo(map);
    });
  </script>

</body>
</html>
