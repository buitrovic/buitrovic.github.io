<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rutas GPX</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet GPX plugin -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <style>
    #map {
      height: 100vh;
    }
	
	
    .etiqueta-visible div {
      background: white;
      border: 2px solid #333;
      color: black;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 5px;
      display: inline-block;
      white-space: nowrap;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.4);
      font-size: 14px;
      transform: translate(-50%, -100%); /* Para centrarla sobre el punto */
    }

  </style>
</head>

<body>

  <div id="map"></div>

  <script>
    /* =====================================
       MAPA
       ===================================== */
   const map = L.map("map").setView([39.8, -0.2], 9);



/* L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap · © OpenTopoMap",
  maxZoom: 17
}).addTo(map);*/
// Capa satélite (ESRI)
const satelite = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri · Maxar · Earthstar Geographics"
  }
).addTo(map);

// Capa de etiquetas y carreteras
const labels = L.tileLayer(
  "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "© Esri"
  }
).addTo(map);


    /* =====================================
       GPX + URL ASOCIADA
       ===================================== */
    const rutas = [
      {
        gpx: "1.gpx",
        url: "https://youtu.be/B6VvOnKYdPg",
        color: "blue"
      },
      {
        gpx: "2.gpx",
        url: "https://youtu.be/N859GPHNy0A",
        color: "red"
      },
 {
        gpx: "Senda lateral Albares.gpx",
        url: "https://www.youtube.com/watch?v=Ay8jkCy4HZQ",
        color: "green"
      }

      
    ];

    /* =====================================
       CARGA DE RUTAS (SOLUCIÓN DEFINITIVA)
       ===================================== */
    rutas.forEach(ruta => {
      const gpxLayer = new L.GPX(ruta.gpx, {
        async: true,
        polyline_options: {
          color: ruta.color,
          weight: 6, // Un poco más grueso para tablets
          opacity: 0.8
        },
        marker_options: {
          startIconUrl: null,
          endIconUrl: null,
          shadowUrl: null,
          wptIconUrls: { '': null }
        }
      });

      gpxLayer.on("loaded", function(e) {
        map.fitBounds(e.target.getBounds(), { padding: [20, 20] });

        // Buscamos los marcadores que el plugin ha creado
        e.target.eachLayer(function(layer) {
          // Si es un marcador y tiene un título (el nombre del waypoint)
          if (layer instanceof L.Marker && layer.options.title) {
            
            // CREAMOS UNA ETIQUETA REAL (No tooltip)
            const etiquetaCustom = L.marker(layer.getLatLng(), {
              icon: L.divIcon({
                className: 'etiqueta-visible',
                html: `<div>${layer.options.title}</div>`,
                iconSize: [100, 20],
                iconAnchor: [50, 10]
              }),
              interactive: true
            });

            etiquetaCustom.addTo(map);
            
            // Hacer que la etiqueta también lleve a YouTube
            etiquetaCustom.on("click", () => window.open(ruta.url, "_blank"));
            
            // Eliminamos el marcador original "invisible" para que no moleste
            map.removeLayer(layer);
          }
        });
      });

      // El clic en la línea sigue funcionando
      gpxLayer.on("click", () => window.open(ruta.url, "_blank"));

      gpxLayer.addTo(map);
    });



  </script>

</body>
</html>
