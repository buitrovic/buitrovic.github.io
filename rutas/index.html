<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Rutas GPX</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet GPX plugin -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <style>
    #map { height: 100vh; }
    
    .etiqueta-visible div {
      background: white !important;
      border: 2px solid #333 !important;
      color: black !important;
      font-weight: bold !important;
      padding: 6px 12px !important;
      border-radius: 8px !important;
      display: inline-block !important;
      white-space: nowrap !important;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.4) !important;
      font-size: 14px !important; 
      transform: translate(-50%, -100%);
      position: absolute;
    }

    @media (max-width: 768px) {
      .etiqueta-visible div {
        font-size: 18px !important; 
        padding: 8px 16px !important;
        border-width: 3px !important;
      }
    }

    .leaflet-marker-icon[src*="marker-icon"] { display: none !important; }
    
    /* Botón "i" */
    .info-button {
      background: white;
      width: 50px;
      height: 50px;
      line-height: 50px;
      text-align: center;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
      font-size: 25px;
      border: 2px solid rgba(0,0,0,0.2);
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }

    /* Menú Hamburguesa */
    .menu-button {
      background: white;
      width: 50px;
      height: 50px;
      line-height: 50px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 30px;
      border: 2px solid rgba(0,0,0,0.2);
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }

    .menu-panel {
      display: none;
      background: white;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid rgba(0,0,0,0.2);
      margin-top: 5px;
    }

    .menu-item {
      display: block;
      padding: 10px;
      margin: 5px 0;
      background: #f0f0f0;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }

    /* Ventana emergente (Modal) */
    .modal-info {
      display: none; 
      position: fixed;
      z-index: 10000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background: white;
      margin: 15% auto;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 400px;
      text-align: center;
      position: relative;
    }
    .close-modal {
      position: absolute;
      right: 15px; top: 10px;
      cursor: pointer;
      font-size: 28px;
    }
  </style>
</head>

<body>

  <div id="map"></div>
  
  <div id="miModal" class="modal-info">
    <div class="modal-content">
      <span class="close-modal" onclick="cerrarModal()">&times;</span>
      <div id="texto-info">
        <p>En pruebas.</p>
      </div>
    </div>
  </div>

  <script>
    /* 1. DEFINICIÓN DE DATOS */
    const grupos = {
      "Rodeando la Muela": [
        { gpx: "Tecnicamuela.gpx", url: "https://es.wikiloc.com/...", color: "red" },
        { gpx: "rodadoramuela.gpx", url: "https://es.wikiloc.com/...", color: "yellow" },
        { gpx: "Muelarivas.gpx", url: "https://es.wikiloc.com/...", color: "blue" }
      ],
      "Visitamos Caudiel": [
        { gpx: "Caudielnovaliches.gpx", url: "https://es.wikiloc.com/...", color: "yellow" },
        { gpx: "molineras.gpx", url: "https://es.wikiloc.com/...", color: "blue" },
        { gpx: "penyaaguilasuperior.gpx", url: "https://es.wikiloc.com/...", color: "red" }
      ]
    };

    let capasActivas = [];

    /* 2. INICIALIZACIÓN DEL MAPA */
    const map = L.map("map").setView([39.8, -0.2], 9);

    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      attribution: "© Esri · Maxar"
    }).addTo(map);

    L.tileLayer("https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}").addTo(map);

    /* 3. FUNCIONES PRINCIPALES */
    function cargarGrupo(nombreGrupo) {
      // Limpiar mapa
      capasActivas.forEach(capa => map.removeLayer(capa));
      capasActivas = [];

      // Cargar nuevas rutas
      grupos[nombreGrupo].forEach(ruta => {
        const gpxLayer = new L.GPX(ruta.gpx, {
          async: true,
          polyline_options: { color: ruta.color, weight: 6, opacity: 0.8 },
          marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null }
        }).addTo(map);

        capasActivas.push(gpxLayer);

        gpxLayer.on("loaded", e => {
          if (ruta === grupos[nombreGrupo][0]) map.fitBounds(e.target.getBounds());
        });

        // Cargar S y X
        fetch(ruta.gpx)
          .then(res => res.text())
          .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
          .then(data => {
            data.querySelectorAll("wpt").forEach(wpt => {
              const name = wpt.querySelector("name") ? wpt.querySelector("name").textContent : null;
              if (name === "S" || name === "X") {
                const marcador = L.marker([wpt.getAttribute("lat"), wpt.getAttribute("lon")], {
                  icon: L.divIcon({
                    className: 'etiqueta-visible',
                    html: `<div style="color:${name === 'S' ? 'yellow' : 'red'}">${name}</div>`,
                    iconSize: [0, 0]
                  })
                }).addTo(map);
                capasActivas.push(marcador);
              }
            });
          });
      });
      if(document.getElementById("menuPanel")) document.getElementById("menuPanel").style.display = "none";
    }

    /* 4. CONTROLES (BOTONES) */
    // Botón Info
    const infoControl = L.control({ position: 'topright' });
    infoControl.onAdd = function() {
      const div = L.DomUtil.create('div', 'info-button');
      div.innerHTML = 'i';
      div.onclick = function() { document.getElementById("miModal").style.display = "block"; };
      return div;
    };
    infoControl.addTo(map);

    // Botón Menú
    const menuControl = L.control({ position: 'topright' });
    menuControl.onAdd = function() {
      const contenedor = L.DomUtil.create('div', 'menu-contenedor');
      contenedor.innerHTML = `
        <div id="btnMenu" class="menu-button">≡</div>
        <div id="menuPanel" class="menu-panel">
          <div class="menu-item" onclick="cargarGrupo('Rodeando la Muela')">Rodeando la Muela</div>
          <div class="menu-item" onclick="cargarGrupo('Visitamos Caudiel')">Visitamos Caudiel</div>
        </div>`;
      L.DomEvent.disableClickPropagation(contenedor);
      contenedor.querySelector('#btnMenu').onclick = function() {
        const panel = document.getElementById("menuPanel");
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
      };
      return contenedor;
    };
    menuControl.addTo(map);

    /* 5. UTILIDADES */
    function cerrarModal() { document.getElementById("miModal").style.display = "none"; }
    
    window.onclick = function(event) {
      if (event.target == document.getElementById("miModal")) cerrarModal();
    }

    // CARGA INICIAL
    cargarGrupo('Rodeando la Muela');
  </script>
</body>
</html>
