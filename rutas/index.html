<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Rutas GPX</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- librería de flechas -->
  <script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

  <!-- Leaflet GPX plugin -->
<script src="https://cdn.jsdelivr.net/npm/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
  
  <style>
    #map { 
  width: 100%;
  height: 100vh; 
  display: block;
}
    
    .etiqueta-visible div {
      background: white !important;
      border: 2px solid #333 !important;
      color: black !important;
      font-weight: bold !important;
      padding: 6px 12px !important;
      border-radius: 8px !important;
      display: inline-block !important;
      white-space: nowrap !important;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.4) !important;
      font-size: 14px !important; 
      transform: translate(-50%, -100%);
      position: absolute;
    }

/* AJUSTE PARA SMARTPHONES (Pantalla pequeña) */
@media (max-width: 480px) {
  .etiqueta-visible div {
    /* Reducimos el texto a la mitad (antes 14px en PC, ahora 7px) */
    font-size: 7px !important;    
    
    /* Reducimos el relleno blanco a la mitad */
    padding: 3px 6px !important;  
    
    /* Hacemos el borde más fino para que no abulte */
    border-width: 1px !important; 
    
    /* Esquinas un poco más cerradas */
    border-radius: 4px !important; 
    
    /* Sombra más suave para que no manche el mapa */
    box-shadow: 1px 1px 3px rgba(0,0,0,0.3) !important;
  }
}

    .leaflet-marker-icon[src*="marker-icon"] { display: none !important; }
    
    /* Botón "i" */
    .info-button {
      background: white;
      width: 50px;
      height: 50px;
      line-height: 50px;
      text-align: center;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
      font-size: 25px;
      border: 2px solid rgba(0,0,0,0.2);
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }

    /* Menú Hamburguesa */
    .menu-button {
      background: white;
      width: 50px;
      height: 50px;
      line-height: 50px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 30px;
      border: 2px solid rgba(0,0,0,0.2);
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }

    .menu-panel {
      display: none;
      background: white;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid rgba(0,0,0,0.2);
      margin-top: 5px;
    }

    .menu-item {
      display: block;
      padding: 10px;
      margin: 5px 0;
      background: #f0f0f0;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }

    /* Ventana emergente (Modal) */
    .modal-info {
      display: none; 
      position: fixed;
      z-index: 10000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background: white;
      margin: 15% auto;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 400px;
      text-align: center;
      position: relative;
    }
    .close-modal {
      position: absolute;
      right: 15px; top: 10px;
      cursor: pointer;
      font-size: 28px;
    }
  </style>
</head>

<body>

  <div id="map"></div>
  
  <div id="miModal" class="modal-info">
    <div class="modal-content">
      <span class="close-modal" onclick="cerrarModal()">&times;</span>
      <div id="texto-info">
        <p>En pruebas.</p>
      </div>
    </div>
  </div>

  <script>
   /* 1. DEFINICIÓN DE DATOS */
    const grupos = {
      "Rodeando la Muela": [
        { gpx: "Tecnicamuela.gpx", url: "https://es.wikiloc.com/rutas-mountain-bike/2025-jerica-no3-6-circular-tecnica-por-la-muela-jonjordana-lateral-cruz-y-tuerto-wikiloc-261896293", color: "red" },
        { gpx: "rodadoramuela.gpx", url: "https://es.wikiloc.com/rutas-mountain-bike/2025-jerica-no3-1-rodadora-a-la-muela-todo-pista-muy-muy-sencilla-sentido-horario-230179483", color: "yellow" },
        { gpx: "Muelarivas.gpx", url: "https://es.wikiloc.com/rutas-mountain-bike/2025-jerica-no3-5-hacia-cueva-santa-por-senda-allmountain-de-manu-y-vuelta-por-pista-covarcho-v-2-0-260738657", color: "blue" }
      ],
      "Visitamos Caudiel": [
        { gpx: "Caudielnovaliches.gpx", url: "https://es.wikiloc.com/rutas-mountain-bike/4c-cortita-y-sencilla-senda-de-caudiel-pinalejo-santa-barbara-169168573", color: "yellow" },
        { gpx: "molineras.gpx", url: "https://es.wikiloc.com/rutas-mountain-bike/2025-jerica-no1-3-b-2-pasos-por-la-molinera-de-caudiel-wikiloc-261895560", color: "blue" },
        { gpx: "penyaaguilasuperior.gpx", url: "https://es.wikiloc.com/rutas-mountain-bike/2025-jerica-no1-5-dura-y-tecnica-pena-aguila-completa-15-km-subiendo-por-asfalto-y-pista-y-15-bajan-261896930", color: "red" }
      ]
    };

    let capasActivas = [];

    /* 2. INICIALIZACIÓN DEL MAPA */
    const map = L.map("map").setView([39.8, -0.2], 9);

    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      attribution: "© Esri · Maxar"
    }).addTo(map);

    L.tileLayer("https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}").addTo(map);

   /* 3. FUNCIONES PRINCIPALES */
let rutaSeleccionada = null; 
    let decoradorFlechas = null; 

    function cargarGrupo(nombreGrupo) {
      // 1. Limpieza absoluta
      capasActivas.forEach(capa => map.removeLayer(capa));
      if (decoradorFlechas) map.removeLayer(decoradorFlechas);
      capasActivas = [];
      rutaSeleccionada = null;

      grupos[nombreGrupo].forEach(ruta => {
        // Creamos la capa GPX con una opción de interacción alta
        const gpxLayer = new L.GPX(ruta.gpx, {
          async: true,
          polyline_options: { 
            color: ruta.color, 
            weight: 6, 
            opacity: 0.8,
            interactive: true // Forzamos que sea interactiva
          },
          marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null, wptIconUrls: { '': null } }
        }).addTo(map);

        capasActivas.push(gpxLayer);

        // Función interna para aplicar el resaltado
        const resaltarRuta = (capaDestacada) => {
          // Si ya estaba seleccionada, abrimos enlace
          if (rutaSeleccionada === capaDestacada) {
            window.open(ruta.url, "_blank");
            return;
          }

          rutaSeleccionada = capaDestacada;

          // Dibujar flechas
          if (decoradorFlechas) map.removeLayer(decoradorFlechas);
          decoradorFlechas = L.polylineDecorator(capaDestacada, {
            patterns: [{
              offset: '10%', repeat: '80px',
              symbol: L.Symbol.arrowHead({
                pixelSize: 12, polygon: true,
                pathOptions: { stroke: false, fillOpacity: 1, color: 'white' }
              })
            }]
          }).addTo(map);

          // Aplicar estilos visuales a todas las capas
          capasActivas.forEach(c => {
            if (c.setStyle) {
              if (c === capaDestacada) {
                c.setStyle({ weight: 5, opacity: 1 });
                c.bringToFront(); 
              } else {
                c.setStyle({ weight: 4, opacity: 0.2 });
              }
            }
            if (c instanceof L.Marker) {
              c.setOpacity(c.options.rutaAsociada === capaDestacada ? 1 : 0.1);
            }
          });
          if (decoradorFlechas) decoradorFlechas.bringToFront();
        };

        // Evento de clic en la ruta
        gpxLayer.on("click", function(e) {
          L.DomEvent.stopPropagation(e);
          resaltarRuta(this);
        });

        gpxLayer.on("loaded", e => {
          if (ruta === grupos[nombreGrupo][0]) map.fitBounds(e.target.getBounds());
        });

        // Etiquetas
        fetch(ruta.gpx).then(res => res.text()).then(str => {
          const data = new window.DOMParser().parseFromString(str, "text/xml");
          data.querySelectorAll("wpt").forEach(wpt => {
            const name = wpt.querySelector("name")?.textContent;
            const prohibidos = ["Inicio", "Fin", "Start", "End"];
            if (name && !prohibidos.includes(name)) {
              const marcador = L.marker([wpt.getAttribute("lat"), wpt.getAttribute("lon")], {
                rutaAsociada: gpxLayer,
                icon: L.divIcon({
                  className: 'etiqueta-visible',
                  html: `<div style="color: black !important; font-weight: bold;">${name}</div>`,
                  iconSize: [0, 0]
                })
              }).addTo(map);
              
              marcador.on("click", (e) => {
                L.DomEvent.stopPropagation(e);
                resaltarRuta(gpxLayer);
              });
              capasActivas.push(marcador);
            }
          });
        });
      });

      if(document.getElementById("menuPanel")) document.getElementById("menuPanel").style.display = "none";
    }

    // RESET al tocar el mapa vacío
    map.on("click", () => {
      rutaSeleccionada = null;
      if (decoradorFlechas) map.removeLayer(decoradorFlechas);
      capasActivas.forEach(c => {
        if (c.setStyle) c.setStyle({ weight: 6, opacity: 0.8 });
        if (c instanceof L.Marker) c.setOpacity(1);
      });
    });
    /* 4. CONTROLES (BOTONES) */
    // Botón Info
    const infoControl = L.control({ position: 'topright' });
    infoControl.onAdd = function() {
      const div = L.DomUtil.create('div', 'info-button');
      div.innerHTML = 'i';
      div.onclick = function() { document.getElementById("miModal").style.display = "block"; };
      return div;
    };
    infoControl.addTo(map);

    // Botón Menú
    const menuControl = L.control({ position: 'topright' });
    menuControl.onAdd = function() {
      const contenedor = L.DomUtil.create('div', 'menu-contenedor');
      contenedor.innerHTML = `
        <div id="btnMenu" class="menu-button">≡</div>
        <div id="menuPanel" class="menu-panel">
          <div class="menu-item" onclick="cargarGrupo('Rodeando la Muela')">Rodeando la Muela</div>
          <div class="menu-item" onclick="cargarGrupo('Visitamos Caudiel')">Visitamos Caudiel</div>
        </div>`;
      L.DomEvent.disableClickPropagation(contenedor);
      contenedor.querySelector('#btnMenu').onclick = function() {
        const panel = document.getElementById("menuPanel");
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
      };
      return contenedor;
    };
    menuControl.addTo(map);

    /* 5. UTILIDADES */
    function cerrarModal() { document.getElementById("miModal").style.display = "none"; }
    
    window.onclick = function(event) {
      if (event.target == document.getElementById("miModal")) cerrarModal();
    }

   // SUSTITUYE TU CARGA INICIAL POR ESTA:
    window.onload = function() {
        // Pequeño retraso de seguridad para asegurar que el div #map existe
        setTimeout(function() {
            map.invalidateSize(); // Fuerza al mapa a recalcular su tamaño
            cargarGrupo('Rodeando la Muela');
        }, 100);
    };
  </script>
</body>
</html>
