<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sendas y rutas por Jérica</title>

  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  color: #fff;
  position: relative;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      rgba(0, 0, 0, 0.45),
      rgba(0, 0, 0, 0.45)
    ),
    url("fondo.jpg") center 15% / 115% no-repeat;

  z-index: -1;
}




    /* TÍTULO */
    header {
      text-align: center;
      padding-top: 50px;
    }

    header h1 {
      font-size: 3rem;
      font-weight: bold;
      text-shadow: 0 4px 8px rgba(0,0,0,0.6);
    }

    /* BOTONES */
    main {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      flex-grow: 1;
    }

    .boton {
      width: 260px;
      padding: 30px 20px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      background: rgba(0, 0, 0, 0.65);
      border: 2px solid rgba(255,255,255,0.5);
      transition: transform 0.2s, background 0.2s;
      cursor: pointer;
      position: relative;
    }

    .boton:hover {
      transform: scale(1.05);
      background: rgba(0, 0, 0, 0.8);
    }

    /* Botón inactivo */
    .inactivo {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }

    /* TOOLTIP */
    .boton[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: -55px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      background: rgba(0,0,0,0.5);
    }
	
	

    /* Responsive */
    @media (max-width: 700px) {
      main {
        flex-direction: column;
        gap: 30px;
      }

      header h1 {
        font-size: 2.2rem;
      }
    }
	
	




/* ===== FONDO EN MÓVIL (DEFINICIÓN COMPLETA + FOOTER VISIBLE) ===== */
@media (max-width: 700px) {

  body {
    height: auto;
    min-height: 100vh;
    overflow-y: auto;
  }

  main {
    flex-grow: 0;
    padding-bottom: 20px;
  }

  footer {
    position: relative;
    margin-top: 20px;
  }

  body::before {
    background:
      linear-gradient(
        rgba(0, 0, 0, 0.45),
        rgba(0, 0, 0, 0.45)
      ),
      url("fondo.jpg") top center / contain no-repeat;
  }
}


  </style>
</head>

<body>

  <header>
    <h1>Sendas y rutas por Jérica</h1>
  </header>

<main>
  <!-- BOTÓN SENDAS (ACTIVO, NUEVA PESTAÑA) -->
  <a
    href="sendas/index.html"
    target="_blank"
    rel="noopener noreferrer"
    class="boton"
    data-tooltip="Aquí se ven las sendas grabadas."
  >
    Sendas <span style="font-size:0.9em;">↗</span>
  </a>

  <!-- BOTÓN RUTAS CIRCULARES (PREPARADO PARA EL FUTURO) -->
  <div
    class="boton inactivo"
    title="Próximamente"
  >
    Rutas circulares
  </div>
</main>

  <footer>
    Página en construcción. Contacto: butradiego@hotmail.com
  </footer>

</body>
</html>
