<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sendas y rutas por Jérica</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}


html {
  font-size: 100%;
}


/* ===== ESTRUCTURA GENERAL ===== */
body {
  color: #fff;
  background: #999;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      rgba(0,0,0,0.45),
      rgba(0,0,0,0.45)
    ),
    url("fondo.jpg") center 15% / 115% no-repeat;
  z-index: -1;
}

/* ===== HEADER ===== */
header {
  text-align: center;
  padding: 40px 20px;
}

header h1 {
  font-size: 3rem;
  text-shadow: 0 4px 8px rgba(0,0,0,0.6);
}

/* ===== MAIN ===== */
main {
  flex-grow: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 60px;
}

/* ===== BOTONES ===== */
.boton {
  width: 260px;
  padding: 30px 20px;
  text-align: center;
  font-size: 1.4rem;
  font-weight: bold;
  border-radius: 14px;
  text-decoration: none;
  color: #fff;
  background: rgba(0,0,0,0.65);
  border: 2px solid rgba(255,255,255,0.5);
  transition: transform 0.2s, background 0.2s;
  cursor: pointer;
  position: relative;
}

.boton:hover {
  transform: scale(1.05);
  background: rgba(0,0,0,0.8);
}

.inactivo {
  opacity: 0.45;
  pointer-events: none;
}

/* ===== TOOLTIP (SOLO PC) ===== */
@media (hover:hover) {
  .boton[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: -55px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
    white-space: nowrap;
  }
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 15px;
  font-size: 0.9rem;
  background: rgba(0,0,0,0.5);
}

/* ===== RESPONSIVE MÓVIL ===== */
@media (max-width: 700px) {

  .hero {
    min-height: auto;
  }

  .hero::before {
    background:
      linear-gradient(
        rgba(0,0,0,0.45),
        rgba(0,0,0,0.45)
      ),
      url("fondo.jpg") top center / contain no-repeat;
  }

  header h1 {
    font-size: 10rem;
  }

  main {
    flex-direction: column;
    gap: 25px;
    padding: 20px 0;
  }
  
  
.boton {
    width: 90%;
    max-width: 340px;
    font-size: 1.7rem;
    padding: 22px 20px;
  }

  footer {
    font-size: 8rem;
  }

  
  
}
</style>
</head>

<body>

<div class="hero">

  <header>
    <h1>Sendas y rutas por Jérica</h1>
  </header>

  <main>
    <a
      href="sendas/index.html"
      target="_blank"
      rel="noopener noreferrer"
      class="boton"
      data-tooltip="Aquí se ven las sendas grabadas."
    >
      Sendas ↗
    </a>

    <div class="boton inactivo">
      Rutas circulares
    </div>
  </main>

</div>

<footer>
  Página en construcción. Contacto: butradiego@hotmail.com
</footer>

</body>
</html>
